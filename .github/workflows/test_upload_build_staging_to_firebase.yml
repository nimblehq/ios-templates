name: Test Upload Staging Build to Firebase

# SECRETS needed:
### SSH_PRIVATE_KEY for Match Repo
### MATCH_PASS
### FIREBASE_GOOGLE_APPLICATION_CREDENTIALS_BASE64
### TEAM_ID

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - uses: ./.github/actions/swiftlint

  build:
    name: Build
    runs-on: macOS-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Create Release Note
      run: |
        echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
        echo "$(git log -1 | grep -o "\[.*")" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Install SSH key
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install Firebase-Tools
      run: |
        yarn global add firebase-tools
        echo "$(yarn global bin)" >> $GITHUB_PATH

    - name: Setup ENV file
      env:
        ENV: ${{ secrets.ENV }}
      run: |
        echo "$ENV" | base64 --decode > template/.env

    - name: Read Google Service Account
      id: firebase_service_account
      uses: timheuer/base64-to-file@adaa40c0c581f276132199d4cf60afa07ce60eac # timheuer/base64-to-file@v1.2
      with:
        fileName: "firebase_service_account.json"
        encodedString: ${{ secrets.FIREBASE_GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}

    - name: Setup CI environment
      uses: ./.github/actions/setup-ci-environment

    - name: Configure Template App for Firebase upload
      run: swift run --package-path scripts/iOSTemplateMaker iOSTemplateMaker make-test-firebase
      env:
        MATCH_REPO: ${{ secrets.MATCH_REPO }}
        TEAM_ID: ${{ secrets.TEAM_ID }}

    - name: Generate Template App
      run: swift run --package-path scripts/iOSTemplateMaker iOSTemplateMaker make --bundle-id-production co.nimblehq.ios.templates --bundle-id-staging co.nimblehq.ios.templates.staging --bundle-id-dev co.nimblehq.ios.templates.dev --project-name TemplateApp

    - name: Sync Ad Hoc Code Signing
      run: bundle exec fastlane syncAdHocStagingCodeSigning
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASS }}

    - name: Build Staging App and Distribute to Firebase
      run: bundle exec fastlane buildStagingAndUploadToFirebase
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.firebase_service_account.outputs.filePath }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7.0.0
      with:
        name: ${{ format('v{0}({1})-{2}', env.VERSION_NUMBER, env.BUILD_NUMBER, env.TAG_TYPE) }}
        path: |
          ${{ env.IPA_OUTPUT_PATH }}
          ${{ env.DSYM_OUTPUT_PATH }}
      env:
        TAG_TYPE: Staging_Firebase

    - name: Remove keychain
      if: ${{ always() }}
      run: bundle exec fastlane removeKeychain
      continue-on-error: true
