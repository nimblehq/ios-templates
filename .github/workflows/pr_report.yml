name: PR Report

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  pull-requests: read
  actions: write

jobs:
  report:
    name: Post PR Report to Slack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get today's date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore daily TS cache
        uses: actions/cache/restore@v4
        with:
          path: .pr_report_ts
          key: pr-report-ts-${{ steps.date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            pr-report-ts-${{ steps.date.outputs.date }}-

      - name: Run PR Report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.PR_REPORT_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.PR_REPORT_SLACK_CHANNEL_ID }}
          PR_REPORT_TS_FILE: .pr_report_ts
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "Slack secrets not configured, skipping report"
            exit 0
          fi
          python3 scripts/pr_report.py

      - name: Save daily TS cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .pr_report_ts
          key: pr-report-ts-${{ steps.date.outputs.date }}-${{ github.run_id }}
