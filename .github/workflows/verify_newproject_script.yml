name: Verify New Project Script

on:
  pull_request:
    paths-ignore:
      - README.md
      - AGENTS.md
      - .github/wiki/**
      - template/README.md
      - template/AGENTS.md

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: macos-latest
    env:
      CI: true
    steps:
    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
      with:
        fetch-depth: 1

    - name: Copy mise config
      run: cp template/.mise.toml .mise.toml

    - name: Setup CI environment
      uses: ./.github/actions/setup-ci-environment
      with:
        bundler-cache: "false"
        run-bundle-install: "false"

    - name: Cache iOSTemplateMaker Build
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
      with:
        path: scripts/iOSTemplateMaker/.build
        key: ${{ runner.os }}-iostemplatemaker-${{ hashFiles('scripts/iOSTemplateMaker/Package.swift', 'scripts/iOSTemplateMaker/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-iostemplatemaker-

    - name: Run iOSTemplateMaker
      run: |
        swift run --package-path scripts/iOSTemplateMaker iOSTemplateMaker make \
          --bundle-id-production co.nimblehq.ios.templates \
          --bundle-id-staging co.nimblehq.ios.templates.staging \
          --bundle-id-dev co.nimblehq.ios.templates.dev \
          --project-name TemplateApp \
          --minimum-version 16.0 \
          --cicd github \
          --github-runner macos-latest
