    - git-clone@8: {}
    - restore-cache@3:
        inputs:
        - key: |-
            spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
            spm-project-{{ checksum "Gemfile.lock" }}
            spm-project-
    - xcode-test@6:
        inputs:
        - scheme: $BITRISE_SCHEME
    - fastlane@3:
        title: Sync Development Staging code signing
        inputs:
        - lane: syncDevelopmentStagingCodeSigning
    - fastlane@3:
