            ~/Library/Developer/Xcode/DerivedData
    envs:
    - opts:
        is_expand: false
      BUNDLE_ID: {BUNDLE_ID_STAGING}
    - opts:
        is_expand: false
      BITRISE_SCHEME: {PROJECT_NAME} Staging
  test:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - script@1:
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            RBENV_DIR="`cd $(rbenv which ruby)/../..;pwd`"
            echo "Gem cache directory: $RBENV_DIR"
            envman add --key GEM_CACHE_PATH --value $RBENV_DIR
        title: Set GEM_CACHE_PATH env var
    - git-clone@8: {}
    - restore-cache@3:
        inputs:
        - key: |-
            spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
            spm-project-{{ checksum "Gemfile.lock" }}
            spm-project-
    - fastlane@3:
        inputs:
        - lane: buildAndTest
    - fastlane@3:
        inputs:
        - lane: cleanUpOutput
    - danger@2:
        inputs:
        - github_api_token: "$DANGER_GITHUB_API_TOKEN"
    - save-cache@1:
        inputs:
        - key: spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
        - paths: |-
            $BITRISE_CACHE_DIR
            $GEM_CACHE_PATH
            ~/Library/Developer/Xcode/DerivedData
    envs:
    - opts:
        is_expand: false
      BUNDLE_ID: {BUNDLE_ID_STAGING}
    - opts:
        is_expand: false
      BITRISE_SCHEME: {PROJECT_NAME} Staging
app:
  envs:
  - opts:
      is_expand: false
    BITRISE_PROJECT_PATH: {PROJECT_NAME}.xcodeproj
  - opts:
      is_expand: false
    TEAM_ID: TEAMID
  - opts:
      is_expand: false
    MATCH_REPO_URL: https://github.com/nimblehq/fastlane-match.git
