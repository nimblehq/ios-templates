---
# SECRETS needed:
### SSH_RSA_PRIVATE_KEY
### MATCH_PASSWORD
### API_KEY_ID
### ISSUER_ID
### APPSTORE_CONNECT_API_KEY
### FIREBASE_TOKEN

format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: ios
tools:
  ruby: "3.2:installed"
trigger_map:
- push_branch: develop
  workflow: deploy_staging
- push_branch: main
  workflow: deploy_testflight
- push_branch: master
  workflow: deploy_app_store
- push_branch: release
  workflow: deploy_release_firebase
- push_branch: "*"
  workflow: test
workflows:
  deploy_app_store:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - script@1:
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            RBENV_DIR="`cd $(rbenv which ruby)/../..;pwd`"
            echo "Gem cache directory: $RBENV_DIR"
            envman add --key GEM_CACHE_PATH --value $RBENV_DIR
        title: Set GEM_CACHE_PATH env var
    - git-clone@8: {}
    - restore-cache@3:
        inputs:
        - key: |-
            spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
            spm-project-{{ checksum "Gemfile.lock" }}
            spm-project-
    - xcode-test@6:
        inputs:
        - scheme: $BITRISE_SCHEME
    - fastlane@3:
        title: Sync App Store code signing
        inputs:
        - lane: syncAppStoreCodeSigning
    - fastlane@3:
        title: Build and upload Production app to App Store
        inputs:
        - lane: buildAndUploadToAppStore
    - fastlane@3:
        title: Remove CI keychain
        inputs:
        - lane: removeKeychain
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BUILD_PATH"
        is_always_run: false
    - save-cache@1:
        inputs:
        - key: spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
        - paths: |-
            $BITRISE_CACHE_DIR
            $GEM_CACHE_PATH
            ~/Library/Developer/Xcode/DerivedData
    envs:
    - opts:
        is_expand: false
      BUNDLE_ID: {BUNDLE_ID_PRODUCTION}
    - opts:
        is_expand: false
      BITRISE_SCHEME: {PROJECT_NAME}
  deploy_testflight:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - script@1:
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            RBENV_DIR="`cd $(rbenv which ruby)/../..;pwd`"
            echo "Gem cache directory: $RBENV_DIR"
            envman add --key GEM_CACHE_PATH --value $RBENV_DIR
        title: Set GEM_CACHE_PATH env var
    - git-clone@8: {}
    - restore-cache@3:
        inputs:
        - key: |-
            spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
            spm-project-{{ checksum "Gemfile.lock" }}
            spm-project-
    - xcode-test@6:
        inputs:
        - scheme: $BITRISE_SCHEME
    - fastlane@3:
        title: Sync App Store code signing
        inputs:
        - lane: syncAppStoreCodeSigning
    - fastlane@3:
        title: Build and upload Production app to TestFlight
        inputs:
        - lane: buildAndUploadToTestFlight
    - fastlane@3:
        title: Remove CI keychain
        inputs:
        - lane: removeKeychain
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BUILD_PATH"
        is_always_run: false
    - save-cache@1:
        inputs:
        - key: spm-project-{{ checksum "Gemfile.lock" }}-{{ checksum "**/Package.resolved" }}
        - paths: |-
            $BITRISE_CACHE_DIR
            $GEM_CACHE_PATH
            ~/Library/Developer/Xcode/DerivedData
    envs:
    - opts:
        is_expand: false
      BUNDLE_ID: {BUNDLE_ID_PRODUCTION}
    - opts:
        is_expand: false
      BITRISE_SCHEME: {PROJECT_NAME}
  deploy_release_firebase:
    steps:
    - activate-ssh-key@4:
