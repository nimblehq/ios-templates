name: Test Add device and regenerate profiles with fastlane match

# SECRETS needed:
### SSH_PRIVATE_KEY for the match Repo
### MATCH_PASSWORD
### APPSTORE_CONNECT_API_KEY
### API_KEY_ID
### ISSUER_ID

on:
  pull_request:
  workflow_dispatch:
    inputs:
      devices:
        description: 'JSON of devices. `{"Luka iPhone 6":"1234567890123456789012345678901234567890","Felix iPad Air 2":"abcdefghijklmnopqrstvuwxyzabcdefghijklmn"}`'
        required: true
        type: string
      platform:
        description: 'The platform'
        required: true
        default: 'ios'
        type: choice
        options:
        - ios
        - mac

jobs:
  create_files:
    name: Create certificates and profiles
    runs-on: macOS-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
      with:
        fetch-depth: 1

    - name: Install SSH key
      uses: webfactory/ssh-agent@836c84ec59a0e7bc0eabc79988384eb567561ee2 # webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Setup CI environment
      uses: ./.github/actions/setup-ci-environment

    - name: Add device and regenerate profiles with match
      run: bundle exec fastlane addDevicesGenerateProfiles
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASS }}
        DEVICES: ${{ inputs.devices }}
        APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        API_KEY_ID: ${{ secrets.API_KEY_ID }}
        ISSUER_ID: ${{ secrets.ISSUER_ID }}
        PLATFORM: ${{ inputs.platform }}

    - name: Clean up keychain
      if: ${{ always() }}
      run: bundle exec fastlane remove_keychain
      continue-on-error: true
