name: Bump app version

on:
  workflow_dispatch:
    inputs:
      nextVersion:
        description: "Next version (eg. 1.0.0)"
        required: true
        type: string

jobs:
  create_bump_version_pull_request:
    name: Create Bump Version Pull Request
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate Version Input
        run: |
          if ! [[ "${{ github.event.inputs.nextVersion }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: nextVersion must follow semantic versioning (e.g., 1.2.3)"
            exit 1
          fi
      - name: Create Bump Version branch
        uses: peterjgrainger/action-create-branch@4b81ce657e255acd677cc6c55c9c763654be3aef # peterjgrainger/action-create-branch@v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: chore/bump-version-to-${{ github.event.inputs.nextVersion }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: chore/bump-version-to-${{ github.event.inputs.nextVersion }}

      - name: Bump version
        run: |
          set -euo pipefail
          filename=$(find . -maxdepth 1 -name "*.xcodeproj" -exec basename {} .xcodeproj \; | head -n 1)
          if [[ -z "$filename" ]]; then
            echo "Error: no .xcodeproj found in root directory"
            exit 1
          fi
          pbxproj="$filename.xcodeproj/project.pbxproj"
          if ! grep -q "MARKETING_VERSION" "$pbxproj"; then
            echo "Error: MARKETING_VERSION not found in $pbxproj"
            exit 1
          fi
          sed -i "" "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ github.event.inputs.nextVersion }}/g" "$pbxproj"
          echo "MARKETING_VERSION updated to ${{ github.event.inputs.nextVersion }} in $pbxproj"
      
      - name: Set up Git
        run: |
          git config --global user.name 'Github Actions'
          git config --global user.email 'github-actions@users.noreply.github.com'

      - name: Commit changes
        run: |
          git add .
          git commit -m "[Chore] Bump version to ${{ github.event.inputs.nextVersion }}"
          git push origin HEAD

      - name: Create pull request
        run: |
          echo -e "## What happened 👀\n\nBump version to ${{ github.event.inputs.nextVersion }}" > body
          export body=$(cat body) ; gh pr create --draft -B ${{ github.ref_name }} -H chore/bump-version-to-${{ github.event.inputs.nextVersion }} -t '[Chore] Bump version to ${{ github.event.inputs.nextVersion }}' -b "$body"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
